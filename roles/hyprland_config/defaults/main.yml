---
# Keybindings that conflict with Omarchy defaults and need to be unbound
keybindings_unbind:
  - "SUPER SHIFT, C"
  - "SUPER SHIFT, G"
  - "SUPER SHIFT, O"
  - "SUPER, slash"

# Custom application keybindings (added on top of Omarchy defaults)
keybindings_custom:
  - bind: "SUPER, slash"
    description: "Passwords"
    command: "uwsm app -- bitwarden-desktop"
  - bind: "SUPER, A"
    description: "Claude"
    command: "~/.local/bin/omarchy-launch-or-focus-webapp Claude \"https://claude.ai\""
  - bind: "SUPER, B"
    description: "Browser"
    command: "$browser"
  - bind: "SUPER ALT, B"
    description: "Browser (private)"
    command: "$browser --private"
  - bind: "SUPER, D"
    description: "Docker"
    command: "$terminal -e lazydocker"
  - bind: "SUPER, E"
    description: "Thunderbird"
    command: "uwsm app -- env GDK_BACKEND=x11 thunderbird"
  - bind: "SUPER, H"
    description: "Homelab"
    command: "~/.local/bin/omarchy-launch-or-focus-webapp Homelab \"http://100.64.0.2:3000\""
  - bind: "SUPER, M"
    description: "Music"
    command: "omarchy-launch-or-focus spotify"
  - bind: "SUPER, N"
    description: "Editor"
    command: "omarchy-launch-editor"
  - bind: "SUPER, R"
    description: "Voice recording"
    command: "~/.local/bin/whispering-toggle"
  - bind: "SUPER, Y"
    description: "YouTube"
    command: "~/.local/bin/omarchy-launch-or-focus-webapp YouTube \"https://youtube.com/\""
  - bind: "SUPER SHIFT, C"
    description: "VSCodium"
    command: "uwsm app -- codium --ozone-platform=wayland"
  - bind: "SUPER SHIFT, G"
    description: "WhatsApp"
    command: "~/.local/bin/omarchy-launch-or-focus-webapp WhatsApp \"https://web.whatsapp.com/\""
  - bind: "SUPER SHIFT, O"
    description: "Obsidian"
    command: "omarchy-launch-or-focus obsidian \"uwsm app -- obsidian --disable-gpu --enable-wayland-ime\""
  - bind: "SUPER SHIFT, T"
    description: "Activity"
    command: "$terminal -e btop"
  - bind: "SUPER CTRL SHIFT, F"
    description: "Fit visible columns"
    dispatcher: "layoutmsg"
    command: "fit visible"
